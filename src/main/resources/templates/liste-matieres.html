<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Liste des Matières</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Matières Enseignées</h2>
            <a href="/admin-dashboard" class="btn btn-secondary btn-sm">Retour Dashboard</a>
        </div>
        <div class="card shadow-sm border-0">
            <table class="table table-hover mb-0">
                <thead class="table-info text-dark">
                    <tr>
                        <th>Intitulé</th>
                        <th>Coefficient</th>
                        <th>Professeur Responsable</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${matieres}">
                        <td th:text="${m.nom}"></td>
                        <td th:text="${m.coefficient}"></td>
                        <td th:text="${m.professeur != null ? m.professeur.nom : 'Non assigné'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
