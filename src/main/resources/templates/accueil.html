<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scolarix | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-w: 260px; --primary: #0d6efd; --dark-bg: #1e293b; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
        
        /* Sidebar Responsive */
        .sidebar { width: var(--sidebar-w); background: var(--dark-bg); color: white; transition: 0.3s; position: fixed; height: 100vh; z-index: 1000; }
        .main-content { margin-left: var(--sidebar-w); flex-grow: 1; padding: 2rem; transition: 0.3s; }
        
        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }

        .nav-link { color: #94a3b8; padding: 0.8rem 1.5rem; border-radius: 8px; margin: 0.2rem 1rem; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: #334155; color: white; }
        
        /* Header style SchoolSync */
        .welcome-card { background: linear-gradient(135deg, #1e293b, #334155); color: white; border-radius: 16px; padding: 2.5rem; margin-bottom: 2rem; }
        .feature-card { border: none; border-radius: 12px; transition: 0.3s; height: 100%; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .feature-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary mb-3">
            <h3 class="fw-bold mb-0 text-warning">SCOLARIX</h3>
        </div>
        <a href="/" class="nav-link active"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
        <div class="px-4 mt-4 mb-2 small text-uppercase text-secondary">Administration</div>
        <a th:href="@{/login-admin}" class="nav-link"><i class="bi bi-people me-2"></i> Rectorat</a>
        <a th:href="@{/login-prof}" class="nav-link"><i class="bi bi-person-video3 me-2"></i> Enseignants</a>
        <div class="px-4 mt-4 mb-2 small text-uppercase text-secondary">Scolarité</div>
        <a th:href="@{/login-etudiant}" class="nav-link"><i class="bi bi-mortarboard me-2"></i> Étudiants</a>
    </nav>

    <div class="main-content">
        <button class="btn btn-dark d-lg-none mb-3" onclick="document.getElementById('sidebar').classList.toggle('active')">
            <i class="bi bi-list"></i> Menu
        </button>

        <div class="welcome-card shadow">
            <h1 class="fw-bold">Bienvenue sur Scolarix 👋</h1>
            <p class="opacity-75">Gérez votre établissement avec fluidité et précision.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card feature-card p-4">
                    <div class="fs-1 text-primary mb-3"><i class="bi bi-shield-lock"></i></div>
                    <h5>Administration</h5>
                    <p class="text-muted small">Gérer les étudiants, professeurs et classes.</p>
                    <a th:href="@{/login-admin}" class="btn btn-primary w-100">Accéder</a>
                </div>
            </div>
            </div>
    </div>

</body>
</html>
