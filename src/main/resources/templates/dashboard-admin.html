<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Rectorat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .stat-box { border-radius: 15px; border: none; transition: 0.3s; color: white; }
        .stat-box:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-check me-2"></i>RECTORAT</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Déconnexion</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-5">
            <div class="col-md-4"><div class="card stat-box bg-primary p-4"><h3>[[${totalEtudiants}]]</h3><p>Étudiants</p></div></div>
            <div class="col-md-4"><div class="card stat-box bg-success p-4"><h3>[[${totalMatieres}]]</h3><p>Matières</p></div></div>
            <div class="col-md-4"><div class="card stat-box bg-warning p-4 text-dark"><h3>[[${moyenneEcole}]]</h3><p>Moyenne École</p></div></div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm mb-4">
                    <h5 class="fw-bold mb-3">Inscrire un Étudiant</h5>
                    <form th:action="@{/admin/ajouter-etudiant}" method="post">
                        <input type="text" name="nom" placeholder="Nom" class="form-control mb-2" required>
                        <input type="text" name="prenom" placeholder="Prénom" class="form-control mb-2" required>
                        <input type="text" name="matricule" placeholder="Matricule (UNIV-XXXX)" class="form-control mb-3" required>
                        <button class="btn btn-primary w-100">Ajouter</button>
                    </form>
                </div>
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-3">Nouvelle Matière</h5>
                    <form th:action="@{/admin/ajouter-matiere}" method="post">
                        <input type="text" name="nom" placeholder="Nom de l'UE" class="form-control mb-3" required>
                        <button class="btn btn-success w-100">Créer</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-3">Base de Données Étudiants</h5>
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr><th>Matricule</th><th>Nom & Prénom</th><th>Action</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="et : ${listeEtudiants}">
                                <td th:text="${et.matricule}" class="fw-bold"></td>
                                <td th:text="${et.nom + ' ' + et.prenom}"></td>
                                <td><a th:href="@{/admin/supprimer-etudiant/{id}(id=${et.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
