<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Saisie de Note</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div th:if="${error}" class="alert alert-danger shadow-sm border-start border-5 border-danger mb-4">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <strong th:text="${error}"></strong>
                </div>

                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h4 class="mb-0 text-center"><i class="bi bi-pencil-square me-2"></i>Saisie d'Examen</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h5 class="fw-bold mb-1" th:text="${etudiant.nom + ' ' + etudiant.prenom}"></h5>
                            <small class="text-muted" th:text="'Matricule : ' + ${etudiant.matricule}"></small>
                        </div>

                        <form th:action="@{/enregistrer-note}" method="post">
                            <input type="hidden" name="etudiantId" th:value="${etudiant.id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold small text-uppercase">Unité d'Enseignement (UE)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-book"></i></span>
                                    <select name="matiereId" class="form-select" required>
                                        <option value="">Choisir la matière...</option>
                                        <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold small text-uppercase">Note Finale (sur 20)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-award"></i></span>
                                    <input type="number" name="valeur" step="0.25" min="0" max="20" class="form-control" placeholder="Ex: 15.5" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg shadow-sm">
                                    <i class="bi bi-check-circle me-2"></i>Enregistrer la note
                                </button>
                                <a th:href="@{/espace-prof}" class="btn btn-outline-secondary">
                                    Annuler
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <p class="text-center text-muted mt-4 small">Système de gestion Scolarix &copy; 2026</p>
            </div>
        </div>
    </div>

</body>
</html>
