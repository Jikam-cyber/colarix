<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Accès Étudiant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div class="card shadow-lg border-0 p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                            <i class="bi bi-mortarboard fs-2"></i>
                        </div>
                        <h3 class="mt-3 fw-bold">Mon Bulletin</h3>
                        <p class="text-muted">Entrez votre matricule universitaire</p>
                    </div>
                    <form th:action="@{/rechercher-bulletin}" method="post">
                        <div class="mb-3">
                            <input type="text" name="matricule" class="form-control form-control-lg text-center" placeholder="UNIV-2026-XX" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Voir mes résultats</button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none small text-muted">Retour à l'accueil</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
