<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Ajouter Matière</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-info text-white text-center p-3">
                        <h3 class="mb-0">Créer une Matière</h3>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/sauvegarder-matiere}" th:object="${matiere}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Intitulé du cours</label>
                                <input type="text" th:field="*{nom}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Coefficient</label>
                                <input type="number" th:field="*{coefficient}" class="form-control" min="1" max="10" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Professeur Responsable</label>
                                <select th:field="*{professeur}" class="form-select" required>
                                    <option value="">-- Sélectionner --</option>
                                    <option th:each="p : ${professeurs}" th:value="${p.id}" th:text="${p.prenom + ' ' + p.nom}"></option>
                                </select>
                            </div>

                           

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-info text-white">Ajouter la matière</button>
                                <a href="/matieres" class="btn btn-outline-secondary">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
