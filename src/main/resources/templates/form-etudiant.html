<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Inscrire Étudiant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center p-3">
                        <h3 class="mb-0">Inscription Étudiant</h3>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/sauvegarder-etudiant}" th:object="${etudiant}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Matricule</label>
                                <input type="text" th:field="*{matricule}" class="form-control" placeholder="Ex: MAT-100" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nom</label>
                                <input type="text" th:field="*{nom}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Prénom</label>
                                <input type="text" th:field="*{prenom}" class="form-control" required>
                            </div>

                            

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Enregistrer l'étudiant</button>
                                <a href="/" class="btn btn-outline-secondary">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
