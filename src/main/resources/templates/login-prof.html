<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Espace Professeur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 15px; border: none; }
        .btn-custom { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body class="container">
    <div class="row justify-content-center w-100">
        <div class="col-md-4">
            <div class="card login-card shadow p-4 border-top border-success border-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-success">PROFESSEUR</h2>
                    <p class="text-muted">Gestion des notes</p>
                </div>
                <form th:action="@{/auth-prof}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Identifiant</label>
                        <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mot de passe</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-custom fw-bold shadow-sm">Se connecter</button>
                    </div>
                </form>
                <div class="mt-4 text-center">
                    <a href="/" class="text-decoration-none text-muted small">← Retour au portail</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
