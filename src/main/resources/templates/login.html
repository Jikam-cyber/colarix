<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Authentification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #050a10; color: white; height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; margin: auto; }
        .form-control { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 10px; padding: 12px; }
        .form-control:focus { background: rgba(255,255,255,0.15); color: white; box-shadow: none; border: 1px solid #ffc107; }
        .btn-login { background: #ffc107; color: black; font-weight: bold; border-radius: 10px; padding: 12px; border: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-warning fs-1"></i>
            <h3 class="mt-2 fw-bold" th:text="${role == 'ADMIN' ? 'Accès Rectorat' : 'Accès Enseignant'}">Connexion</h3>
            <p class="text-white-50 small">Veuillez entrer vos identifiants</p>
        </div>
        
        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form th:action="@{/verifier-login}" method="post">
            <input type="hidden" name="role" th:value="${role}">
            <div class="mb-3">
                <label class="small mb-1 text-white-50">Identifiant</label>
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>
            <div class="mb-4">
                <label class="small mb-1 text-white-50">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login w-100">Se connecter</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-white-50 small text-decoration-none">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
