<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Bulletin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-bulletin { border: 2px solid #003366; border-radius: 10px; overflow: hidden; }
        .header-univ { background-color: #003366; color: white; padding: 25px; }
        .mention-box { border: 2px dashed #ddd; padding: 15px; background: #fcfcfc; border-radius: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card card-bulletin shadow-lg">
            <div class="header-univ text-center">
                <h2 class="fw-bold mb-0">SCOLARIX UNIVERSITY</h2>
                <p class="small mb-0">RELEVÉ DE NOTES OFFICIEL</p>
            </div>
            
            <div class="card-body p-5">
                <div class="row mb-4">
                    <div class="col-6">
                        <h6 class="text-muted">ÉTUDIANT</h6>
                        <h5 class="fw-bold" th:text="${etudiant.nom + ' ' + etudiant.prenom}"></h5>
                        <p class="mb-0" th:text="'Matricule: ' + ${etudiant.matricule}"></p>
                    </div>
                </div>

                <table class="table table-bordered align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Matière</th>
                            <th class="text-center">Note / 20</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="n : ${notes}">
                            <td th:text="${n.matiere.nom}"></td>
                            <td class="text-center fw-bold" th:text="${n.valeur}"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="row mt-5 align-items-center">
                    <div class="col-md-6">
                        <div class="mention-box text-center">
                            <span class="text-muted small">RÉSULTAT GLOBAL</span>
                            <div class="d-flex justify-content-around mt-2">
                                <div><small>MOYENNE</small><h3 class="fw-bold text-primary" th:text="${moyenne}"></h3></div>
                                <div><small>MENTION</small><h3 th:class="'fw-bold ' + ${couleurMention}" th:text="${mention}"></h3></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 text-center">
                        <p class="small text-muted">Certifié conforme par le Rectorat</p>
                        <p class="fw-bold text-decoration-underline">Le Secrétariat Général</p>
                    </div>
                </div>

                <div class="text-center mt-5 no-print">
                    <a th:href="@{/ajouter-note/{id}(id=${etudiant.id})}" class="btn btn-primary btn-lg me-2">
                        + Saisir une autre note
                    </a>
                    <button onclick="window.print()" class="btn btn-dark btn-lg me-2">Imprimer</button>
                    <a href="/espace-prof" class="btn btn-outline-secondary btn-lg">Retour à la liste</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
