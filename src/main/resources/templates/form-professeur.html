<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Ajouter Professeur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white text-center p-3">
                        <h3 class="mb-0">Ajouter un Professeur</h3>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/sauvegarder-professeur}" th:object="${professeur}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nom du Professeur</label>
                                <input type="text" th:field="*{nom}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Prénom</label>
                                <input type="text" th:field="*{prenom}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Spécialité</label>
                                <input type="text" th:field="*{specialite}" class="form-control" placeholder="Ex: Informatique" required>
                            </div>

                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark">Enregistrer le Professeur</button>
                                <a href="/professeurs" class="btn btn-outline-secondary">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
