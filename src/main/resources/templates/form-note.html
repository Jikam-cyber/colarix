<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scolarix | Ajouter Note</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-warning text-dark text-center p-3">
                        <h3 class="mb-0">Saisie de Note</h3>
                    </div>
                    <div class="card-body p-4">
                        <div class="text-center mb-3">
                            Étudiant : <strong th:text="${etudiant.prenom + ' ' + etudiant.nom}"></strong>
                        </div>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/sauvegarder-note}" th:object="${note}" method="post">
                            <input type="hidden" name="etudiant" th:value="${etudiant.id}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold">Matière</label>
                                <select th:field="*{matiere}" class="form-select" required>
                                    <option value="">-- Choisir --</option>
                                    <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Note obtenue (/20)</label>
                                <input type="number" step="0.25" th:field="*{valeur}" class="form-control" min="0" max="20" required>
                            </div>

                           
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Valider la Note</button>
                                <a th:href="@{'/bulletin/' + ${etudiant.id}}" class="btn btn-outline-secondary">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
